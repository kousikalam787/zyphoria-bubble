<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zyphoria Bubble</title>

<style>
body{
  margin:0;
  background:#0f172a;
  overflow:hidden;
}
canvas{
  display:block;
  margin:auto;
  background:#1e293b;
}
</style>
</head>

<body>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const R = 18;
const ROWS = 10;
const COLS = 10;
const SIZE = R * 2;

let grid = [];
let shooter = { x: canvas.width/2, y: canvas.height-60 };
let current = null;
let colors = ["red","blue","green","yellow"];

function initGrid(){
  grid = [];
  for(let r=0;r<ROWS;r++){
    grid[r] = [];
    for(let c=0;c<COLS;c++){
      if(r < 5){
        grid[r][c] = colors[Math.floor(Math.random()*colors.length)];
      } else {
        grid[r][c] = null;
      }
    }
  }
}

function newBubble(){
  current = {
    x: shooter.x,
    y: shooter.y,
    dx: 0,
    dy: 0,
    color: colors[Math.floor(Math.random()*colors.length)],
    moving:false
  };
}

canvas.addEventListener("click", e=>{
  if(current.moving) return;
  let angle = Math.atan2(e.clientY - shooter.y, e.clientX - shooter.x);
  current.dx = Math.cos(angle)*6;
  current.dy = Math.sin(angle)*6;
  current.moving = true;
});

function update(){
  if(!current.moving) return;

  current.x += current.dx;
  current.y += current.dy;

  if(current.x < R || current.x > canvas.width-R){
    current.dx *= -1;
  }

  if(current.y < R){
    snapToGrid();
  }

  // collision check
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      if(grid[r][c]){
        let x = c*SIZE + 50;
        let y = r*SIZE + 50;
        let d = Math.hypot(x-current.x,y-current.y);
        if(d < SIZE-2){
          snapToGrid();
          return;
        }
      }
    }
  }
}

function snapToGrid(){
  current.moving = false;

  let c = Math.floor((current.x-50)/SIZE);
  let r = Math.floor((current.y-50)/SIZE);

  if(r < 0) r = 0;
  if(c < 0) c = 0;
  if(c >= COLS) c = COLS-1;

  grid[r][c] = current.color;

  checkMatch(r,c,current.color);
  newBubble();
}

function getNeighbors(r,c){
  return [
    [r-1,c],[r+1,c],
    [r,c-1],[r,c+1]
  ];
}

function floodFill(r,c,color,visited){
  if(r<0||c<0||r>=ROWS||c>=COLS) return [];
  if(visited[r][c]) return [];
  if(grid[r][c] !== color) return [];

  visited[r][c] = true;

  let result = [[r,c]];

  getNeighbors(r,c).forEach(n=>{
    result = result.concat(floodFill(n[0],n[1],color,visited));
  });

  return result;
}

function checkMatch(r,c,color){
  let visited = Array.from({length:ROWS},()=>Array(COLS).fill(false));
  let cluster = floodFill(r,c,color,visited);

  if(cluster.length >= 3){
    cluster.forEach(cell=>{
      grid[cell[0]][cell[1]] = null;
    });
  }
}

function drawBubble(x,y,color){
  ctx.beginPath();
  ctx.arc(x,y,R,0,Math.PI*2);
  ctx.fillStyle = color;
  ctx.fill();
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      if(grid[r][c]){
        drawBubble(c*SIZE+50, r*SIZE+50, grid[r][c]);
      }
    }
  }

  drawBubble(current.x,current.y,current.color);

  requestAnimationFrame(draw);
}

function loop(){
  update();
  requestAnimationFrame(loop);
}

initGrid();
newBubble();
draw();
loop();
</script>

</body>
</html>
