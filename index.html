<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zyphoria Bubble</title>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:Arial;
}

/* COMMON BG FIX */
.bg{
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
}

/* HOME */
#home{
  position:fixed;
  width:100%;
  height:100%;
  background:url("bg_game.jpg");
}
#home.bg{background-size:cover;}
#home{
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  color:white;
}

/* MAP */
#map{
  position:fixed;
  width:100%;
  height:100%;
  background:url("map_bg.jpg");
}
#map.bg{background-size:cover;}
#map{
  display:none;
  overflow-y:scroll;
}

/* LEVEL BUTTON */
.level{
  width:70px;
  height:70px;
  border-radius:50%;
  background:gold;
  text-align:center;
  line-height:70px;
  font-weight:bold;
  position:absolute;
}

/* GAME */
#gameScreen{
  position:fixed;
  width:100%;
  height:100%;
  background:url("bg_game.jpg");
}
#gameScreen.bg{background-size:cover;}
#gameScreen{display:none;}

canvas{
  display:block;
}

/* UI */
#ui{
  position:absolute;
  top:10px;
  left:10px;
  color:white;
  font-size:18px;
}

button{
  padding:15px 25px;
  font-size:18px;
  border:none;
  border-radius:10px;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="bg">
  <h1>Zyphoria Bubble</h1>
  <button onclick="openMap()">Play</button>
</div>

<!-- MAP -->
<div id="map" class="bg"></div>

<!-- GAME -->
<div id="gameScreen" class="bg">
  <div id="ui">Score: <span id="score">0</span></div>
  <canvas id="game"></canvas>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

/* RESPONSIVE CANVAS */
function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.onresize = resize;
resize();

/* ==== IMAGE LOAD ==== */
const img = {
  red:new Image(),
  blue:new Image(),
  green:new Image(),
  yellow:new Image()
};

img.red.src="bubble_red.png";
img.blue.src="bubble_blue.png";
img.green.src="bubble_green.png";
img.yellow.src="bubble_yellow.png";

/* ==== MAP ==== */
function openMap(){
  home.style.display="none";
  map.style.display="block";
  map.innerHTML="";

  let y=100;

  for(let i=1;i<=20;i++){
    let lvl=document.createElement("div");
    lvl.className="level";
    lvl.innerText=i;

    let x=(i%2==0)?80:window.innerWidth-150;

    lvl.style.left=x+"px";
    lvl.style.top=y+"px";

    lvl.onclick=()=>startGame(i);

    map.appendChild(lvl);

    y+=130;
  }
}

/* ==== GAME ==== */
let grid=[], current, score=0;
const R=22; // bigger bubble
const SIZE=R*2;
const ROWS=10, COLS=8;
let colors=["red","blue","green","yellow"];

function startGame(level){
  map.style.display="none";
  gameScreen.style.display="block";

  score=0;
  scoreEl.innerText=score;

  grid=[];
  for(let r=0;r<ROWS;r++){
    grid[r]=[];
    for(let c=0;c<COLS;c++){
      grid[r][c]=(r<3+Math.floor(level/3))?
      colors[Math.floor(Math.random()*4)]:null;
    }
  }

  newBubble();
}

function newBubble(){
  current={
    x:canvas.width/2,
    y:canvas.height-80,
    dx:0,dy:0,
    color:colors[Math.floor(Math.random()*4)],
    moving:false
  };
}

canvas.onclick=(e)=>{
  if(!current || current.moving) return;

  let rect=canvas.getBoundingClientRect();
  let x=e.clientX-rect.left;
  let y=e.clientY-rect.top;

  let angle=Math.atan2(y-current.y,x-current.x);
  current.dx=Math.cos(angle)*7;
  current.dy=Math.sin(angle)*7;
  current.moving=true;
};

function update(){
  if(!current || !current.moving) return;

  current.x+=current.dx;
  current.y+=current.dy;

  if(current.x<R||current.x>canvas.width-R){
    current.dx*=-1;
  }

  if(current.y<R){
    snap();
  }

  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      if(grid[r][c]){
        let x=c*SIZE+60;
        let y=r*SIZE+60;
        if(Math.hypot(x-current.x,y-current.y)<SIZE-2){
          snap(); return;
        }
      }
    }
  }
}

function snap(){
  current.moving=false;

  let c=Math.floor((current.x-60)/SIZE);
  let r=Math.floor((current.y-60)/SIZE);

  if(r<0) r=0;
  if(c<0) c=0;
  if(c>=COLS) c=COLS-1;

  grid[r][c]=current.color;

  checkMatch(r,c,current.color);
  newBubble();
}

function neighbors(r,c){
  return [[r-1,c],[r+1,c],[r,c-1],[r,c+1]];
}

function flood(r,c,color,vis){
  if(r<0||c<0||r>=ROWS||c>=COLS) return [];
  if(vis[r][c]||grid[r][c]!==color) return [];

  vis[r][c]=true;
  let res=[[r,c]];

  neighbors(r,c).forEach(n=>{
    res=res.concat(flood(n[0],n[1],color,vis));
  });

  return res;
}

function checkMatch(r,c,color){
  let vis=Array.from({length:ROWS},()=>Array(COLS).fill(false));
  let cluster=flood(r,c,color,vis);

  if(cluster.length>=3){
    cluster.forEach(cell=>{
      grid[cell[0]][cell[1]]=null;
      score+=10;
    });

    scoreEl.innerText=score;
  }
}

/* 🎯 PERFECT IMAGE DRAW */
function drawBubble(x,y,color){
  let image=img[color];

  if(image.complete){
    ctx.drawImage(image, x-R, y-R, R*2, R*2);
  } else {
    ctx.beginPath();
    ctx.arc(x,y,R,0,Math.PI*2);
    ctx.fillStyle=color;
    ctx.fill();
  }
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      if(grid[r][c]){
        drawBubble(c*SIZE+60,r*SIZE+60,grid[r][c]);
      }
    }
  }

  if(current){
    drawBubble(current.x,current.y,current.color);
  }

  requestAnimationFrame(draw);
}

function loop(){
  update();
  requestAnimationFrame(loop);
}

draw();
loop();
</script>

</body>
</html>
