<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zyphoria Bubble</title>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:Arial;
}

/* LOADING */
#loading{
  position:fixed;
  width:100%;
  height:100%;
  background:#000;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:30px;
}

/* HOME */
#home{
  position:fixed;
  width:100%;
  height:100%;
  background:url("bg_game.jpg") no-repeat center center;
  background-size:cover;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  color:white;
}

button{
  padding:15px 30px;
  font-size:18px;
  border:none;
  border-radius:10px;
}

/* LEVEL MAP */
#map{
  position:fixed;
  width:100%;
  height:100%;
  background:#111;
  display:none;
  flex-wrap:wrap;
  padding:20px;
}

.level{
  width:60px;
  height:60px;
  margin:10px;
  background:#4ade80;
  display:flex;
  justify-content:center;
  align-items:center;
  border-radius:10px;
  color:black;
  font-weight:bold;
  cursor:pointer;
}

/* GAME */
canvas{
  display:none;
  background:url("bg_game.jpg") no-repeat center center;
  background-size:cover;
}

/* UI */
#ui{
  position:fixed;
  top:10px;
  left:10px;
  color:white;
}
</style>
</head>

<body>

<div id="loading">Loading...</div>

<div id="home">
  <h1>Zyphoria Bubble</h1>
  <button onclick="openMap()">Play</button>
</div>

<div id="map"></div>

<div id="ui">
  Score: <span id="score">0</span>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

/* ==== LOAD ASSETS ==== */
const assets = {
  red:new Image(),
  blue:new Image(),
  green:new Image(),
  yellow:new Image(),
  bg:new Image()
};

assets.red.src="bubble_red.png";
assets.blue.src="bubble_blue.png";
assets.green.src="bubble_green.png";
assets.yellow.src="bubble_yellow.png";
assets.bg.src="bg_game.jpg";

const popSound = new Audio("pop.mp3");

/* ==== WAIT FOR LOAD ==== */
let loaded = 0;
let total = 5;

function checkLoad(){
  loaded++;
  if(loaded>=total){
    document.getElementById("loading").style.display="none";
    document.getElementById("home").style.display="flex";
  }
}

Object.values(assets).forEach(img=>{
  img.onload = checkLoad;
});

/* ==== LEVEL MAP ==== */
function openMap(){
  document.getElementById("home").style.display="none";
  let map = document.getElementById("map");
  map.style.display="flex";
  map.innerHTML="";

  for(let i=1;i<=20;i++){
    let lvl=document.createElement("div");
    lvl.className="level";
    lvl.innerText=i;
    lvl.onclick=()=>startGame(i);
    map.appendChild(lvl);
  }
}

/* ==== GAME ==== */
let grid=[], current, score=0;
const R=18, SIZE=R*2, ROWS=10, COLS=10;
let colors=["red","blue","green","yellow"];

function startGame(level){
  document.getElementById("map").style.display="none";
  canvas.style.display="block";
  score=0;

  grid=[];
  for(let r=0;r<ROWS;r++){
    grid[r]=[];
    for(let c=0;c<COLS;c++){
      grid[r][c]=(r<3+Math.floor(level/3))?
      colors[Math.floor(Math.random()*4)]:null;
    }
  }

  newBubble();
}

function newBubble(){
  current={
    x:canvas.width/2,
    y:canvas.height-60,
    dx:0,dy:0,
    color:colors[Math.floor(Math.random()*4)],
    moving:false
  };
}

canvas.addEventListener("click",e=>{
  if(current.moving) return;
  let angle=Math.atan2(e.clientY-current.y,e.clientX-current.x);
  current.dx=Math.cos(angle)*6;
  current.dy=Math.sin(angle)*6;
  current.moving=true;
});

function update(){
  if(!current.moving) return;

  current.x+=current.dx;
  current.y+=current.dy;

  if(current.x<R||current.x>canvas.width-R){
    current.dx*=-1;
  }

  if(current.y<R){
    snap();
  }

  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      if(grid[r][c]){
        let x=c*SIZE+50;
        let y=r*SIZE+50;
        if(Math.hypot(x-current.x,y-current.y)<SIZE-2){
          snap(); return;
        }
      }
    }
  }
}

function snap(){
  current.moving=false;

  let c=Math.floor((current.x-50)/SIZE);
  let r=Math.floor((current.y-50)/SIZE);

  if(r<0) r=0;
  if(c<0) c=0;
  if(c>=COLS) c=COLS-1;

  grid[r][c]=current.color;

  checkMatch(r,c,current.color);
  newBubble();
}

function neighbors(r,c){
  return [[r-1,c],[r+1,c],[r,c-1],[r,c+1]];
}

function flood(r,c,color,vis){
  if(r<0||c<0||r>=ROWS||c>=COLS) return [];
  if(vis[r][c]||grid[r][c]!==color) return [];

  vis[r][c]=true;
  let res=[[r,c]];

  neighbors(r,c).forEach(n=>{
    res=res.concat(flood(n[0],n[1],color,vis));
  });

  return res;
}

function checkMatch(r,c,color){
  let vis=Array.from({length:ROWS},()=>Array(COLS).fill(false));
  let cluster=flood(r,c,color,vis);

  if(cluster.length>=3){
    popSound.currentTime=0;
    popSound.play();

    cluster.forEach(cell=>{
      grid[cell[0]][cell[1]]=null;
      score+=10;
    });

    document.getElementById("score").innerText=score;
  }
}

function drawBubble(x,y,color){
  let img=assets[color];
  if(img.complete){
    ctx.drawImage(img,x-R,y-R,R*2,R*2);
  }
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      if(grid[r][c]){
        drawBubble(c*SIZE+50,r*SIZE+50,grid[r][c]);
      }
    }
  }

  if(current){
    drawBubble(current.x,current.y,current.color);
  }

  requestAnimationFrame(draw);
}

function loop(){
  update();
  requestAnimationFrame(loop);
}

draw();
loop();
</script>

</body>
</html>
