<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bubble Game</title>

<style>
body{
  margin:0;
  font-family:Arial;
  overflow:hidden;
  background:#000;
}

#home{
  position:fixed;
  width:100%;
  height:100%;
  background:#111;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  color:white;
}

#map{
  position:fixed;
  width:100%;
  height:100%;
  background:#222;
  display:none;
}

.level{
  width:60px;
  height:60px;
  background:gold;
  border-radius:50%;
  position:absolute;
  display:flex;
  justify-content:center;
  align-items:center;
  font-weight:bold;
  cursor:pointer;
}

#gameScreen{
  position:fixed;
  width:100%;
  height:100%;
  background:#0b1220;
  display:none;
}

canvas{
  display:block;
}

#ui{
  position:absolute;
  top:10px;
  left:10px;
  color:white;
}

button{
  padding:12px 20px;
}
</style>
</head>

<body>

<div id="home">
  <h1>Bubble Game</h1>
  <button onclick="openMap()">Play</button>
</div>

<div id="map"></div>

<div id="gameScreen">
  <div id="ui">Score: <span id="score">0</span></div>
  <canvas id="game"></canvas>
</div>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

function resize(){
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
}
resize();

/* 🔊 SOUND (SAFE) */
const popSound = new Audio();
popSound.src = "pop.mp3";
popSound.volume = 0.7;

/* GAME DATA */
let grid=[], current, score=0;
const R=20, SIZE=R*2;
const ROWS=8, COLS=8;
let colors=["red","blue","green","yellow"];

/* MAP */
function openMap(){
  document.getElementById("home").style.display="none";
  let map=document.getElementById("map");
  map.style.display="block";
  map.innerHTML="";

  let y=60;

  for(let i=1;i<=15;i++){
    let lvl=document.createElement("div");
    lvl.className="level";
    lvl.innerText=i;

    let x=(i%2==0)?80:window.innerWidth-120;

    lvl.style.left=x+"px";
    lvl.style.top=y+"px";

    lvl.onclick=()=>startGame(i);

    map.appendChild(lvl);

    y+=120;
  }
}

/* START */
function startGame(level){
  document.getElementById("map").style.display="none";
  document.getElementById("gameScreen").style.display="block";

  score=0;
  document.getElementById("score").innerText=score;

  grid=[];

  for(let r=0;r<ROWS;r++){
    grid[r]=[];
    for(let c=0;c<COLS;c++){
      grid[r][c]=(r<2+Math.floor(level/4))?
      colors[Math.floor(Math.random()*4)]:null;
    }
  }

  newBubble();
}

/* BUBBLE */
function newBubble(){
  current={
    x:canvas.width/2,
    y:canvas.height-60,
    dx:0,dy:0,
    color:colors[Math.floor(Math.random()*4)],
    moving:false
  };
}

/* SHOOT */
canvas.onclick=(e)=>{
  if(!current || current.moving) return;

  let angle=Math.atan2(e.clientY-current.y,e.clientX-current.x);

  current.dx=Math.cos(angle)*6;
  current.dy=Math.sin(angle)*6;
  current.moving=true;
};

/* UPDATE */
function update(){
  if(!current || !current.moving) return;

  current.x+=current.dx;
  current.y+=current.dy;

  if(current.x<R||current.x>canvas.width-R) current.dx*=-1;

  if(current.y<R) snap();

  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      if(grid[r][c]){
        let x=c*SIZE+50;
        let y=r*SIZE+50;

        if(Math.hypot(x-current.x,y-current.y)<SIZE){
          snap();
          return;
        }
      }
    }
  }
}

/* SNAP */
function snap(){
  current.moving=false;

  let c=Math.floor(current.x/SIZE);
  let r=Math.floor(current.y/SIZE);

  if(r<0) r=0;
  if(c<0) c=0;
  if(c>=COLS) c=COLS-1;

  if(!grid[r]) grid[r]=[];

  grid[r][c]=current.color;

  check(r,c,current.color);

  newBubble();
}

/* MATCH */
function check(r,c,color){
  let vis=Array.from({length:ROWS},()=>Array(COLS).fill(false));

  function flood(r,c){
    if(r<0||c<0||r>=ROWS||c>=COLS) return [];
    if(vis[r][c]||grid[r][c]!==color) return [];

    vis[r][c]=true;
    let res=[[r,c]];

    [[1,0],[-1,0],[0,1],[0,-1]].forEach(d=>{
      res=res.concat(flood(r+d[0],c+d[1]));
    });

    return res;
  }

  let cluster=flood(r,c);

  if(cluster.length>=3){

    /* 🔊 SOUND PLAY */
    try{
      popSound.currentTime=0;
      popSound.play();
    }catch(e){}

    cluster.forEach(p=>{
      grid[p[0]][p[1]]=null;
      score+=10;
    });

    document.getElementById("score").innerText=score;
  }
}

/* DRAW */
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      if(grid[r][c]){
        ctx.beginPath();
        ctx.arc(c*SIZE+50,r*SIZE+50,R,0,Math.PI*2);
        ctx.fillStyle=grid[r][c];
        ctx.fill();
      }
    }
  }

  if(current){
    ctx.beginPath();
    ctx.arc(current.x,current.y,R,0,Math.PI*2);
    ctx.fillStyle=current.color;
    ctx.fill();
  }

  requestAnimationFrame(draw);
}

function loop(){
  update();
  requestAnimationFrame(loop);
}

draw();
loop();
</script>

</body>
</html>
